<!DOCTYPE html>
<html>
<head>
    <title>MyWay</title>
    <style>
    #spinner {
        display: none;
        text-align: center;
        margin-top: 20px;
        color: #aaaaaa;
        font-size: 16px;
    }

    .dot-animate {
    animation: blink 1.4s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
    }

        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 60px auto;
            background: #0f0f0f;
            color: #ffffff;
            padding: 0 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #dddddd;
        }
    </style>
</head>
<body>
    <h1>MyWay</h1>
    <p>Your personalized career roadmap inspired by the world's greatest tech leaders.</p>
    <form method="POST" action="/generate">
        <input type="text" name="year" placeholder="What year are you in CS?" required>
        <input type="text" name="skills" placeholder="What are your current skills?" required>
        <input type="text" name="targeted_role" placeholder="What is your target role?" required>
        <input type="text" name="dream_company" placeholder="What is your dream company?" required>
        <input type="text" name="hours_commitment" placeholder="Hours per week you can dedicate?" required>
        <button type="submit">Generate My Roadmap →</button>
    </form>
    <div id="spinner">
        <p id="spinner-text">Analyzing your profile<span class="dot-animate">...</span></p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            document.querySelector('button').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
        
            const messages = [
                "Analyzing your profile",
                "Matching you with a leader",
                "Generating your roadmap"
            ];
        
        let i = 0;
        setInterval(function() {
            i = (i + 1) % messages.length;
            document.getElementById('spinner-text').innerHTML = messages[i] + '<span class="dot-animate">...</span>';
        }, 1500);
    });
</script>
</body>
</html>
