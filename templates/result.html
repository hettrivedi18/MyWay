<!DOCTYPE html>
<html>
<head>
    <title>MyWay - Your Roadmap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 60px auto;
            background: #0f0f0f;
            color: #ffffff;
            padding: 0 20px;
            line-height: 1.8;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
        }
        .roadmap {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            white-space: pre-wrap;
        }
        a {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #ffffff;
            color: #000000;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            background: #dddddd;
        }
    </style>
</head>
<body>
    <h1>Your MyWay Roadmap</h1>
    <div class="roadmap">{{ roadmap }}</div>
    <a href="/">Generate Another</a>
</body>
</html>
